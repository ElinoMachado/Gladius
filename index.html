<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gladius — Sobreviventes do Coliseu</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="damage-float-layer" aria-hidden="true"></div>
      <div id="ui-root"></div>
      <div id="global-top-corner" class="global-top-corner">
        <div class="music-volume-wrap" title="Volume da música de fundo">
          <span
            id="music-volume-icon"
            class="music-volume-icon"
            aria-hidden="true"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" focusable="false">
              <path
                fill="currentColor"
                d="M3 10v4h4l5 5V5L7 10H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 5.08v2.02A7.001 7.001 0 0119 12a7 7 0 01-5 6.9v2.02c3.95-.49 7-3.85 7-7.92s-3.05-7.43-7-7.92z"
              />
            </svg>
          </span>
          <input
            id="music-volume-range"
            type="range"
            min="0"
            max="100"
            value="28"
            aria-label="Volume da música"
          />
        </div>
        <div id="global-synergy-slot" class="global-synergy-slot" hidden></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
