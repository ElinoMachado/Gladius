# Publica a pasta `dist` (build Vite). O index.html na RAIZ do repo é só para dev — NÃO uses
# Pages "Deploy from branch" com folder /(root) ou verás ecrã branco (/src/main.ts 404).
# Settings → Pages → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Patch SemVer no deploy: o bundle usa a versão já incrementada; commit [skip ci] mantém o repo alinhado.
      - run: npm version patch --no-git-tag-version
      # `GITHUB_REPOSITORY` (ex.: Owner/Gladius) alimenta `vite.config` → base `/${repo}/` para o coliseu GLB não 404.
      - run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_PAGES_REPO_NAME: ${{ github.event.repository.name }}
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --staged --quiet; then
            echo "No package version changes to commit"
          else
            git commit -m "chore: bump version for Pages deploy [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
